name: Auto Release

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: "3.10"

      - name: Determine next version
        id: version
        run: |
          # Extract last tag
          LAST_TAG=$(git describe --tags --abbrev=0 || echo "v0.1.2")
            
          # Compute next patch version
          BASE=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="$MAJOR.$MINOR.$NEXT_PATCH"
            
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag -a "v${{ steps.version.outputs.next_version }}" -m "Release v${{ steps.version.outputs.next_version }}"
          git push origin "v${{ steps.version.outputs.next_version }}"

      - name: Re-checkout to include the new tag
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build tools
        run: pip install build setuptools_scm

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.10.0